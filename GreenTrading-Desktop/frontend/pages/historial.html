<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - GreenTrading Desktop</title>
    <link rel="stylesheet" href="../assets/css/historial.css">
</head>
<body>
    <div class="historial-container">
        <!-- Header -->
        <header class="historial-header">
            <div class="header-row">
                <h1 class="historial-title">📜 Historial de Setups</h1>
                <div class="header-actions">
                    <!-- Live Indicator (Discrete pulsating dot) -->
                    <div style="display: flex; align-items: center;">
                        <div id="liveIndicator" class="live-indicator"></div>
                        <span id="lastUpdate" class="status-text">Última actualización: --</span>
                    </div>
                    <button id="refreshBtn" class="btn-refresh">
                        🔄 <span>Actualizar</span>
                    </button>
                    <a href="dashboard.html" class="btn-refresh" style="text-decoration: none;">
                        📊 <span>Dashboard</span>
                    </a>
                </div>
            </div>
            
            <!-- Filters Bar -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label class="filter-label" for="strategyFilter">Estrategia</label>
                    <select id="strategyFilter" class="filter-select">
                        <option value="all">Todas</option>
                        <option value="SMC_M15_PRO">SMC M15 PRO</option>
                        <option value="SMC_H1_M15_PRO">SMC H1+M15 PRO</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" for="symbolFilter">Símbolo</label>
                    <select id="symbolFilter" class="filter-select">
                        <option value="all">Todos</option>
                        <option value="Boom 1000 Index">Boom 1000</option>
                        <option value="Boom 900 Index">Boom 900</option>
                        <option value="Boom 600 Index">Boom 600</option>
                        <option value="Boom 500 Index">Boom 500</option>
                        <option value="Boom 300 Index">Boom 300</option>
                        <option value="Crash 1000 Index">Crash 1000</option>
                        <option value="Crash 900 Index">Crash 900</option>
                        <option value="Crash 600 Index">Crash 600</option>
                        <option value="Crash 500 Index">Crash 500</option>
                        <option value="Crash 300 Index">Crash 300</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label" for="estadoFilter">Estado</label>
                    <select id="estadoFilter" class="filter-select">
                        <option value="all">Todos</option>
                        <option value="ACTIVA">Activa</option>
                        <option value="ESPERANDO_ENTRADA">Esperando Entrada</option>
                        <option value="LLEGANDO_A_ZONA">Llegando a Zona</option>
                        <option value="EN_ZONA">En Zona</option>
                        <option value="PROFIT">Profit</option>
                        <option value="TP">TP</option>
                        <option value="SL">SL</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label" for="fromDate">Desde</label>
                    <input type="date" id="fromDate" class="filter-input">
                </div>
                
                <div class="filter-group">
                    <label class="filter-label" for="toDate">Hasta</label>
                    <input type="date" id="toDate" class="filter-input">
                </div>
            </div>
            
            <!-- Statistics Panel -->
            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-label">Total Setups</div>
                    <div class="stat-value" id="totalSetups">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">TP</div>
                    <div class="stat-value stat-tp" id="countTP">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">SL</div>
                    <div class="stat-value stat-sl" id="countSL">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Profit</div>
                    <div class="stat-value stat-profit" id="countPROFIT">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">En Zona</div>
                    <div class="stat-value" id="countENZONA">0</div>
                </div>
            </div>
        </header>
        
        <!-- Content -->
        <div class="content-wrapper">
            <!-- Table -->
            <div class="table-container">
                <table class="historial-table">
                    <thead>
                        <tr>
                            <th>Fecha Creación</th>
                            <th>Símbolo</th>
                            <th>Estrategia</th>
                            <th>Entrada</th>
                            <th>StopLoss</th>
                            <th>TP 1:1</th>
                            <th>Estado Dashboard</th>
                            <th>Estado</th>
                            <th>Resultado (pts)</th>
                            <th>Contexto</th>
                        </tr>
                    </thead>
                    <tbody id="historialTableBody">
                        <!-- Rows will be inserted here by JavaScript -->
                        <tr>
                            <td colspan="10" style="text-align: center; padding: 40px; color: #6b7280;">
                                Cargando historial...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="../assets/js/historial.js"></script>
</body>
</html>
